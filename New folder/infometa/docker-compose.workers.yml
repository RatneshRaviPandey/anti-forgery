version: '3.8'

services:
  scan-logger-worker:
    build: .
    container_name: infometa-worker-scan-logger
    command: npx tsx src/lib/queue/workers/scan-logger.ts
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  alert-engine-worker:
    build: .
    container_name: infometa-worker-alert-engine
    command: npx tsx src/lib/queue/workers/alert-engine.ts
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  qr-generator-worker:
    build: .
    container_name: infometa-worker-qr-generator
    command: npx tsx src/lib/queue/workers/qr-generator.ts
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  email-notifier-worker:
    build: .
    container_name: infometa-worker-email-notifier
    command: npx tsx src/lib/queue/workers/email-notifier.ts
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
