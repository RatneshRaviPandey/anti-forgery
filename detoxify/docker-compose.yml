version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: detoxify-db
    environment:
      POSTGRES_USER: detoxify
      POSTGRES_PASSWORD: detoxify
      POSTGRES_DB: detoxify
    ports:
      - '5433:5432'
    volumes:
      - detoxify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U detoxify']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: detoxify-redis
    ports:
      - '6380:6379'
    volumes:
      - detoxify_redis:/data

volumes:
  detoxify_pgdata:
  detoxify_redis:
